<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="MindMap OPS — offline-first folder notes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MindMap OPS" />
  <link rel="manifest" href="/mindmap-pwa/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <title>MindMap OPS</title>

  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-panel: #1c1c1c;
      --bg-hover: #191919;
      --bg-sel: #0d2218;
      --border: #2a2a2a;
      --border2: #333;
      --em: #10b981;
      --em-dim: rgba(16,185,129,0.12);
      --amber: #f59e0b;
      --rose: #f43f5e;
      --sky: #38bdf8;
      --text: #e5e7eb;
      --text2: #9ca3af;
      --text3: #4b5563;
      --fh: 'Barlow Condensed', sans-serif;
      --fm: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--fh); overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      display: flex; flex-direction: column;
      height: 100dvh; width: 100vw;
      overflow: hidden; position: relative;
    }

    /* ── SCREENS ─────────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
      transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .sc-on  { transform: translateX(0); }
    .sc-off { transform: translateX(100%); pointer-events: none; }

    /* ── HEADER ──────────────────────────────────────── */
    .hdr {
      display: flex; align-items: center;
      height: 52px; padding: 0 14px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 8px;
    }
    .hdr-title {
      font-family: var(--fh); font-weight: 700;
      font-size: 17px; letter-spacing: 0.08em; color: var(--em);
      flex: 1;
    }
    .hdr-back {
      background: none; border: none; cursor: pointer;
      color: var(--em); padding: 6px 8px 6px 0;
      display: flex; align-items: center; gap: 5px;
      font-family: var(--fh); font-weight: 600; font-size: 14px;
    }
    .hdr-back svg { width: 15px; height: 15px; }
    .hdr-filename {
      flex: 1; font-family: var(--fh); font-weight: 700;
      font-size: 15px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .save-pill {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--fm); font-size: 10px; color: var(--text3);
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--em); flex-shrink: 0;
    }
    .sdot.saving { background: var(--amber); animation: blink .7s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .ibtn {
      background: none; border: none; cursor: pointer;
      color: var(--text3); padding: 7px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s; flex-shrink: 0;
    }
    .ibtn:hover, .ibtn:active { color: var(--em); background: var(--em-dim); }
    .ibtn svg { width: 17px; height: 17px; }

    /* ── BREADCRUMB ──────────────────────────────────── */
    #crumb-bar {
      height: 32px; padding: 0 14px;
      display: flex; align-items: center; gap: 3px;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
      font-family: var(--fm); font-size: 10px; color: var(--text3);
    }
    #crumb-bar::-webkit-scrollbar { display: none; }
    .crumb { color: var(--text3); white-space: nowrap; }
    .crumb.last { color: var(--text2); }
    .csep { opacity: .4; flex-shrink: 0; }

    /* ── TREE LIST ───────────────────────────────────── */
    #tree-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #tree-list::-webkit-scrollbar { width: 3px; }
    #tree-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── TREE ITEM ───────────────────────────────────── */
    .ti {
      display: flex; align-items: center;
      min-height: 48px; padding-right: 8px;
      cursor: pointer; position: relative;
      border-bottom: 1px solid transparent;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      transition: background .1s;
    }
    .ti:active { background: var(--bg-hover); }
    .ti.sel { background: var(--bg-sel); }
    .ti.sel .ti-name { color: var(--em); }

    /* indent guides */
    .ti-indent { display: flex; align-items: stretch; flex-shrink: 0; }
    .iu {
      width: 20px; flex-shrink: 0; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .iu-line {
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 1px; background: var(--border); transform: translateX(-50%);
    }

    /* chevron */
    .ti-chev {
      width: 22px; height: 48px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); transition: transform .18s, color .15s;
    }
    .ti-chev svg { width: 13px; height: 13px; }
    .ti-chev.open { transform: rotate(90deg); }
    .ti-chev.ghost { opacity: 0; pointer-events: none; }

    /* icon */
    .ti-icon {
      width: 34px; height: 48px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ti-icon svg { width: 19px; height: 19px; }
    .ic-folder     { color: var(--amber); }
    .ic-folder-open{ color: var(--em); }
    .ic-file       { color: var(--sky); }

    /* body */
    .ti-body { flex: 1; min-width: 0; padding: 5px 0; display: flex; flex-direction: column; justify-content: center; }
    .ti-name {
      font-family: var(--fh); font-weight: 600; font-size: 14px;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ti-meta {
      font-family: var(--fm); font-size: 10px; color: var(--text3);
      margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* more btn */
    .ti-more {
      width: 34px; height: 48px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text3); border-radius: 6px;
      opacity: 0; transition: opacity .15s, color .15s;
    }
    .ti:hover .ti-more, .ti.sel .ti-more { opacity: 1; }
    .ti-more:hover { color: var(--em); }
    .ti-more svg { width: 14px; height: 14px; }

    .ti.dragging { opacity: 0.2; pointer-events: none; }
    .ti.drag-ready { background: rgba(16,185,129,0.06); transform: scale(0.99); }

    /* drop indicator line */
    #drop-line {
      position: fixed; left: 0; right: 0; height: 2px;
      background: var(--em); pointer-events: none;
      z-index: 200; display: none;
      box-shadow: 0 0 8px rgba(16,185,129,0.7);
      border-radius: 1px;
    }
    #drop-line::before {
      content: ''; position: absolute; left: 12px;
      top: 50%; transform: translateY(-50%);
      width: 7px; height: 7px; background: var(--em); border-radius: 50%;
    }

    /* drag ghost */
    #drag-ghost {
      position: fixed; z-index: 300; pointer-events: none;
      background: var(--bg-panel); border: 1px solid var(--em);
      border-radius: 8px; padding: 0 14px;
      display: none; align-items: center; gap: 10px;
      height: 46px; max-width: 260px;
      box-shadow: 0 10px 36px rgba(0,0,0,0.65), 0 0 0 1px rgba(16,185,129,0.2);
      font-family: var(--fh); font-weight: 600; font-size: 14px; color: var(--em);
      transform: scale(1.04) rotate(-1deg);
      transition: transform .1s;
    }
    #drag-ghost svg { width: 17px; height: 17px; flex-shrink: 0; }
    #drag-ghost span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── EMPTY STATE ─────────────────────────────────── */
    #empty-state {
      flex: 1; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 14px;
    }
    #empty-state svg { width: 54px; height: 54px; color: var(--text3); }
    .es-title {
      font-family: var(--fh); font-weight: 700;
      font-size: 18px; letter-spacing: .06em; color: var(--text3);
    }
    .es-sub {
      font-family: var(--fm); font-size: 11px;
      color: var(--text3); opacity: .6; line-height: 1.7;
    }

    /* ── BOTTOM BAR ──────────────────────────────────── */
    #bot-bar {
      display: flex; gap: 8px;
      padding: 10px 14px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--bg-card); border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bbtn {
      flex: 1; height: 42px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); cursor: pointer;
      font-family: var(--fh); font-weight: 600;
      font-size: 13px; letter-spacing: .04em;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .bbtn:active, .bbtn:hover { border-color: var(--em); color: var(--em); background: var(--em-dim); }
    .bbtn svg { width: 13px; height: 13px; }

    /* ── EDITOR ──────────────────────────────────────── */
    #ed-meta {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; background: var(--bg-card);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #ed-path {
      font-family: var(--fm); font-size: 10px; color: var(--text3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    #ed-stats {
      font-family: var(--fm); font-size: 10px; color: var(--text3);
      flex-shrink: 0; margin-left: 12px;
    }
    #ed-ta {
      flex: 1; background: var(--bg); border: none; outline: none; resize: none;
      color: var(--text); font-family: var(--fm); font-size: 14px; line-height: 1.75;
      padding: 20px 18px; caret-color: var(--em);
      overflow-y: auto; scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #ed-ta::placeholder { color: var(--text3); }
    #ed-ta::-webkit-scrollbar { width: 3px; }
    #ed-ta::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── CONTEXT MENU ────────────────────────────────── */
    #ctx {
      position: fixed; z-index: 500;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 5px 0; min-width: 190px;
      box-shadow: 0 14px 44px rgba(0,0,0,.75); display: none;
    }
    #ctx.on { display: block; }
    .ci {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      font-family: var(--fh); font-weight: 600; font-size: 14px; color: var(--text);
      cursor: pointer; transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .ci:active, .ci:hover { background: rgba(255,255,255,.04); }
    .ci.danger { color: var(--rose); }
    .ci svg { width: 14px; height: 14px; flex-shrink: 0; }
    .csep2 { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── MODAL ───────────────────────────────────────── */
    #modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      z-index: 600; display: none;
      align-items: center; justify-content: center; padding: 24px;
    }
    #modal.on { display: flex; }
    #modal-box {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; width: 100%; max-width: 320px;
    }
    .modal-title {
      font-family: var(--fh); font-weight: 700; font-size: 15px;
      letter-spacing: .07em; color: var(--text2); margin-bottom: 14px;
    }
    #modal-in {
      width: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; color: var(--text);
      font-family: var(--fh); font-weight: 600; font-size: 15px;
      outline: none; transition: border-color .15s;
    }
    #modal-in:focus { border-color: var(--em); }
    .modal-row { display: flex; gap: 8px; margin-top: 16px; }
    .mbtn {
      flex: 1; height: 40px; border-radius: 6px;
      font-family: var(--fh); font-weight: 600; font-size: 13px;
      cursor: pointer; border: 1px solid var(--border); transition: all .15s;
    }
    .mbtn.cancel { background: transparent; color: var(--text2); }
    .mbtn.cancel:hover { background: var(--bg-hover); }
    .mbtn.ok { background: var(--em); color: #000; border-color: var(--em); }
    .mbtn.ok:hover { opacity: .85; }

    /* ── TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 76px; left: 50%;
      transform: translateX(-50%) translateY(28px);
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 18px;
      font-family: var(--fm); font-size: 12px; color: var(--text);
      z-index: 999; opacity: 0; pointer-events: none; white-space: nowrap;
      transition: transform .22s, opacity .22s;
    }
    #toast.on { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── SAFE AREA ───────────────────────────────────── */
    @supports (padding-top: env(safe-area-inset-top)) {
      .hdr { padding-top: env(safe-area-inset-top); height: calc(52px + env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════ TREE SCREEN ══════════════════════════ -->
  <div id="tree-sc" class="screen sc-on">

    <div class="hdr">
      <span class="hdr-title">MINDMAP OPS</span>
      <div class="save-pill">
        <div class="sdot" id="sdot"></div>
        <span id="slbl">SAVED</span>
      </div>
      <button class="ibtn" id="btn-exp" aria-label="Export JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="ibtn" id="btn-imp" aria-label="Import JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="imp-in" accept=".json" style="display:none" />
    </div>

    <div id="crumb-bar" aria-label="Current path">
      <span class="crumb last">/ root</span>
    </div>

    <div id="tree-list" role="tree" aria-label="Folder tree"></div>

    <div id="empty-state">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 38V14a2 2 0 012-2h10l4 4h18a2 2 0 012 2v20a2 2 0 01-2 2H8a2 2 0 01-2-2z"/>
        <line x1="24" y1="22" x2="24" y2="32"/><line x1="19" y1="27" x2="29" y2="27"/>
      </svg>
      <div class="es-title">NO FILES YET</div>
      <div class="es-sub">Tap NEW FOLDER or NEW FILE below<br>to start building your structure</div>
    </div>

    <div id="bot-bar">
      <button class="bbtn" id="btn-nf" aria-label="New folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        NEW FOLDER
      </button>
      <button class="bbtn" id="btn-ntf" aria-label="New text file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        NEW FILE
      </button>
    </div>
  </div>

  <!-- ══════════ EDITOR SCREEN ════════════════════════ -->
  <div id="ed-sc" class="screen sc-off">

    <div class="hdr">
      <button class="hdr-back" id="ed-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        BACK
      </button>
      <span class="hdr-filename" id="ed-fname">file</span>
      <div class="save-pill">
        <div class="sdot" id="ed-sdot"></div>
        <span id="ed-slbl">SAVED</span>
      </div>
    </div>

    <div id="ed-meta">
      <span id="ed-path">/ root</span>
      <span id="ed-stats">0 words</span>
    </div>

    <textarea id="ed-ta"
      placeholder="Start writing here…&#10;&#10;Plain text. Auto-saves as you type."
      aria-label="File content"
      spellcheck="true"
    ></textarea>

  </div>
</div>

<!-- Context Menu -->
<div id="ctx" role="menu">
  <div class="ci" id="ci-open">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Open
  </div>
  <div class="ci" id="ci-ren">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Rename
  </div>
  <div class="ci" id="ci-inf">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    New Folder Inside
  </div>
  <div class="ci" id="ci-inf2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    New File Inside
  </div>
  <div class="csep2"></div>
  <div class="ci danger" id="ci-del">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Delete
  </div>
</div>

<!-- Modal -->
<div id="modal" role="dialog" aria-modal="true">
  <div id="modal-box">
    <div class="modal-title" id="modal-title">NEW FOLDER</div>
    <input type="text" id="modal-in" placeholder="Enter name…" autocomplete="off" spellcheck="false" />
    <div class="modal-row">
      <button class="mbtn cancel" id="modal-cancel">Cancel</button>
      <button class="mbtn ok" id="modal-ok">Create</button>
    </div>
  </div>
</div>

<div id="drop-line"></div>
<div id="drag-ghost">
  <svg id="ghost-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></svg>
  <span id="ghost-label"></span>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
<script type="module">
/* ═══════════════════════════════════════════════════════
   MINDMAP OPS  —  Folder Tree + Text Files
   ═══════════════════════════════════════════════════════ */
const { get, set } = idbKeyval;
const DB_KEY = 'mops-items-v2';

// ─── State ────────────────────────────────────────────
let items = [];
let selId   = null;
let openId  = null;
let ctxId   = null;
let modalMode = null;  // 'cf' | 'ctf' | 'ren'
let modalPid  = null;

// ─── Helpers ──────────────────────────────────────────
let _c = Date.now();
const uid = () => 'i' + (++_c);

function children(pid) {
  return items.filter(i => i.parentId === (pid || null));
}

function ancestors(id) {
  const res = [];
  let cur = items.find(i => i.id === id);
  while (cur?.parentId) {
    cur = items.find(i => i.id === cur.parentId);
    if (cur) res.unshift(cur);
  }
  return res;
}

function path(id) {
  const item = items.find(i => i.id === id);
  if (!item) return '/ root';
  return '/ ' + [...ancestors(id).map(a => a.name), item.name].join(' / ');
}

function descendants(fid) {
  const res = [];
  const q = [fid];
  while (q.length) {
    const cur = q.shift();
    items.filter(i => i.parentId === cur).forEach(c => { res.push(c.id); q.push(c.id); });
  }
  return res;
}

function childCount(fid) { return items.filter(i => i.parentId === fid).length; }

function wordCount(s) { return (s || '').trim().split(/\s+/).filter(Boolean).length; }

function reltime(ts) {
  const d = Date.now() - ts;
  if (d < 60000)    return 'just now';
  if (d < 3600000)  return `${Math.floor(d/60000)}m ago`;
  if (d < 86400000) return `${Math.floor(d/3600000)}h ago`;
  return `${Math.floor(d/86400000)}d ago`;
}

// ─── Persist ──────────────────────────────────────────
let saveT = null;
function schedSave() {
  setSdot('saving');
  clearTimeout(saveT);
  saveT = setTimeout(async () => {
    await set(DB_KEY, items);
    setSdot('saved');
  }, 350);
}
function setSdot(s) {
  document.getElementById('sdot').className = s === 'saving' ? 'sdot saving' : 'sdot';
  document.getElementById('slbl').textContent = s === 'saving' ? 'SAVING…' : 'SAVED';
}
function setEdSdot(s) {
  document.getElementById('ed-sdot').className = s === 'saving' ? 'sdot saving' : 'sdot';
  document.getElementById('ed-slbl').textContent = s === 'saving' ? 'SAVING…' : 'SAVED';
}

// ─── Visible flat list (DFS) ──────────────────────────
function flatVisible() {
  const out = [];
  function walk(pid, depth) {
    children(pid).forEach(item => {
      out.push({ ...item, depth });
      if (item.type === 'folder' && item.expanded) walk(item.id, depth + 1);
    });
  }
  walk(null, 0);
  return out;
}

// ─── Render tree ──────────────────────────────────────
function render() {
  const list = document.getElementById('tree-list');
  const empty = document.getElementById('empty-state');
  const flat = flatVisible();

  if (items.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'flex';
    updateCrumb();
    return;
  }
  list.style.display = 'block';
  empty.style.display = 'none';

  list.innerHTML = '';
  flat.forEach(item => list.appendChild(mkItem(item)));
  updateCrumb();
}

function mkItem(item) {
  const el = document.createElement('div');
  el.className = `ti${item.id === selId ? ' sel' : ''}`;
  el.dataset.id = item.id;
  el.setAttribute('role', 'treeitem');

  // Indent guides
  const ind = document.createElement('div');
  ind.className = 'ti-indent';
  for (let d = 0; d < item.depth; d++) {
    const u = document.createElement('div');
    u.className = 'iu';
    const ln = document.createElement('div');
    ln.className = 'iu-line';
    u.appendChild(ln);
    ind.appendChild(u);
  }
  el.appendChild(ind);

  // Chevron
  const chev = document.createElement('div');
  chev.className = 'ti-chev';
  chev.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
  if (item.type === 'folder') {
    if (childCount(item.id) === 0) chev.classList.add('ghost');
    if (item.expanded) chev.classList.add('open');
    chev.addEventListener('click', ev => { ev.stopPropagation(); toggleFolder(item.id); });
  } else {
    chev.classList.add('ghost');
  }
  el.appendChild(chev);

  // Icon
  const ico = document.createElement('div');
  ico.className = 'ti-icon';
  if (item.type === 'folder') {
    ico.innerHTML = item.expanded
      ? `<svg class="ic-folder-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><path d="M2 10h20"/></svg>`
      : `<svg class="ic-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`;
  } else {
    ico.innerHTML = `<svg class="ic-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
  }
  el.appendChild(ico);

  // Body
  const body = document.createElement('div');
  body.className = 'ti-body';
  const name = document.createElement('div');
  name.className = 'ti-name';
  name.textContent = item.name;
  body.appendChild(name);
  const meta = document.createElement('div');
  meta.className = 'ti-meta';
  if (item.type === 'folder') {
    const n = childCount(item.id);
    meta.textContent = n === 0 ? 'empty' : `${n} item${n !== 1 ? 's' : ''}`;
  } else {
    const w = wordCount(item.content);
    const t = item.updatedAt ? reltime(item.updatedAt) : 'never edited';
    meta.textContent = w > 0 ? `${w} word${w !== 1 ? 's' : ''} · ${t}` : t;
  }
  body.appendChild(meta);
  el.appendChild(body);

  // More button
  const more = document.createElement('button');
  more.className = 'ti-more';
  more.setAttribute('aria-label', 'More options');
  more.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>`;
  more.addEventListener('click', ev => {
    ev.stopPropagation();
    selId = item.id; render();
    showCtx(ev.clientX, ev.clientY, item.id);
  });
  el.appendChild(more);

  // Click (desktop)
  el.addEventListener('click', ev => { if (!dg.active) onItemClick(item); });

  // Touch: hold 250ms = drag, hold 600ms = context menu, quick tap = open
  let pressT = null, ctxT = null, pressX = 0, pressY = 0, didDrag = false;
  el.addEventListener('touchstart', ev => {
    if (ev.target.closest('.ti-more, .ti-chev')) return;
    const t = ev.touches[0];
    pressX = t.clientX; pressY = t.clientY; didDrag = false;

    pressT = setTimeout(() => {
      el.classList.add('drag-ready');
      if (navigator.vibrate) navigator.vibrate(18);
      // Once drag-ready, next touchmove will start the actual drag
      el._dragReady = true;
    }, 250);

    ctxT = setTimeout(() => {
      if (el._dragReady && !dg.active) {
        el.classList.remove('drag-ready');
        el._dragReady = false;
        clearTimeout(pressT);
        selId = item.id; render();
        const r = el.getBoundingClientRect();
        showCtx(r.right - 44, r.top + r.height / 2, item.id);
        if (navigator.vibrate) navigator.vibrate(30);
      }
    }, 600);
  }, { passive: true });

  el.addEventListener('touchmove', ev => {
    const t = ev.touches[0];
    const dx = Math.abs(t.clientX - pressX);
    const dy = Math.abs(t.clientY - pressY);

    if (el._dragReady && !dg.active && dy > 4) {
      // Crossed movement threshold while drag-ready → start drag
      el._dragReady = false;
      el.classList.remove('drag-ready');
      clearTimeout(ctxT);
      didDrag = true;
      startDrag(item.id, t.clientY, t.clientX);
      return;
    }

    // Cancel press timers if moved before drag-ready
    if (!el._dragReady && (dx > 8 || dy > 8)) {
      clearTimeout(pressT); clearTimeout(ctxT);
    }
  }, { passive: true });

  el.addEventListener('touchend', ev => {
    clearTimeout(pressT); clearTimeout(ctxT);
    el._dragReady = false;
    el.classList.remove('drag-ready');
    if (dg.active) { endDrag(); return; }
    if (!didDrag) onItemClick(item);
  });

  el.addEventListener('contextmenu', ev => {
    ev.preventDefault();
    selId = item.id; render();
    showCtx(ev.clientX, ev.clientY, item.id);
  });

  return el;
}

function onItemClick(item) {
  selId = item.id;
  if (item.type === 'folder') {
    toggleFolder(item.id);
  } else {
    render();
    openFile(item.id);
  }
}

// ─── Folder toggle ────────────────────────────────────
function toggleFolder(fid) {
  const f = items.find(i => i.id === fid);
  if (!f) return;
  f.expanded = !f.expanded;
  render();
  schedSave();
}

// ─── Breadcrumb ───────────────────────────────────────
function updateCrumb() {
  const bar = document.getElementById('crumb-bar');
  if (!selId) { bar.innerHTML = `<span class="crumb last">/ root</span>`; return; }
  const item = items.find(i => i.id === selId);
  if (!item) { bar.innerHTML = `<span class="crumb last">/ root</span>`; return; }
  const parts = [{ id: null, name: 'root' }, ...ancestors(selId), item];
  bar.innerHTML = parts.map((p, idx) => {
    const last = idx === parts.length - 1;
    const sep  = idx > 0 ? `<span class="csep"> /</span> ` : '';
    return `${sep}<span class="crumb${last ? ' last' : ''}">${p.name}</span>`;
  }).join('');
}

// ─── File editor ──────────────────────────────────────
function openFile(fid) {
  const f = items.find(i => i.id === fid);
  if (!f || f.type !== 'file') return;
  openId = fid;
  document.getElementById('ed-fname').textContent = f.name;
  document.getElementById('ed-path').textContent  = path(fid);
  document.getElementById('ed-ta').value = f.content || '';
  updStats(f.content || '');
  setEdSdot('saved');
  document.getElementById('ed-sc').classList.replace('sc-off', 'sc-on');
  setTimeout(() => document.getElementById('ed-ta').focus(), 280);
}

function closeEditor() {
  openId = null;
  document.getElementById('ed-sc').classList.replace('sc-on', 'sc-off');
}

let edT = null;
document.getElementById('ed-ta').addEventListener('input', ev => {
  if (!openId) return;
  setEdSdot('saving');
  updStats(ev.target.value);
  clearTimeout(edT);
  edT = setTimeout(() => {
    const f = items.find(i => i.id === openId);
    if (f) { f.content = ev.target.value; f.updatedAt = Date.now(); schedSave(); setEdSdot('saved'); }
  }, 500);
});

function updStats(txt) {
  const w = wordCount(txt);
  const c = txt.length;
  document.getElementById('ed-stats').textContent = `${w} word${w !== 1 ? 's' : ''} · ${c} char${c !== 1 ? 's' : ''}`;
}

document.getElementById('ed-back').addEventListener('click', () => {
  // Force save on back
  const f = items.find(i => i.id === openId);
  if (f) { f.content = document.getElementById('ed-ta').value; f.updatedAt = Date.now(); schedSave(); }
  closeEditor();
  render();
});

// ─── Create / Delete / Rename ─────────────────────────
function targetPid() {
  if (!selId) return null;
  const s = items.find(i => i.id === selId);
  return s ? (s.type === 'folder' ? s.id : s.parentId) : null;
}

function mkFolder(pid, name) {
  const f = { id: uid(), type: 'folder', name: name.trim() || 'New Folder', parentId: pid || null, content: '', expanded: false, createdAt: Date.now(), updatedAt: Date.now() };
  items.push(f);
  if (pid) { const p = items.find(i => i.id === pid); if (p) p.expanded = true; }
  selId = f.id;
  render(); schedSave();
  toast(`"${f.name}" created`);
}

function mkFile(pid, name) {
  const f = { id: uid(), type: 'file', name: name.trim() || 'New File', parentId: pid || null, content: '', expanded: false, createdAt: Date.now(), updatedAt: Date.now() };
  items.push(f);
  if (pid) { const p = items.find(i => i.id === pid); if (p) p.expanded = true; }
  selId = f.id;
  render(); schedSave();
  toast(`"${f.name}" created`);
  openFile(f.id);
}

function renItem(id, name) {
  const item = items.find(i => i.id === id);
  if (!item || !name.trim()) return;
  item.name = name.trim(); item.updatedAt = Date.now();
  render(); schedSave();
  if (openId === id) {
    document.getElementById('ed-fname').textContent = item.name;
    document.getElementById('ed-path').textContent  = path(id);
  }
}

function delItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const kill = new Set([id, ...descendants(id)]);
  items = items.filter(i => !kill.has(i.id));
  if (kill.has(openId)) closeEditor();
  if (kill.has(selId)) selId = null;
  render(); schedSave();
  toast(`Deleted "${item.name}"${kill.size > 1 ? ` + ${kill.size-1} item(s)` : ''}`);
}

// ─── Modal ────────────────────────────────────────────
const MODAL_CFG = {
  cf:  { title: 'NEW FOLDER',    ok: 'Create',  ph: 'Folder name…'  },
  ctf: { title: 'NEW FILE',      ok: 'Create',  ph: 'File name…'    },
  ren: { title: 'RENAME',        ok: 'Rename',  ph: 'New name…'     },
};
function openModal(mode, pid, cur = '') {
  modalMode = mode; modalPid = pid;
  const cfg = MODAL_CFG[mode];
  document.getElementById('modal-title').textContent = cfg.title;
  document.getElementById('modal-ok').textContent    = cfg.ok;
  document.getElementById('modal-in').placeholder   = cfg.ph;
  document.getElementById('modal-in').value         = cur;
  document.getElementById('modal').classList.add('on');
  setTimeout(() => { document.getElementById('modal-in').focus(); document.getElementById('modal-in').select(); }, 80);
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  modalMode = null; modalPid = null;
}
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', ev => {
  if (ev.target === document.getElementById('modal')) closeModal();
});
document.getElementById('modal-ok').addEventListener('click', () => {
  const val = document.getElementById('modal-in').value.trim();
  if (!val) { document.getElementById('modal-in').focus(); return; }
  if (modalMode === 'cf')  mkFolder(modalPid, val);
  if (modalMode === 'ctf') mkFile(modalPid, val);
  if (modalMode === 'ren') renItem(ctxId || selId, val);
  closeModal();
});
document.getElementById('modal-in').addEventListener('keydown', ev => {
  if (ev.key === 'Enter')  document.getElementById('modal-ok').click();
  if (ev.key === 'Escape') closeModal();
});

// ─── Context menu ─────────────────────────────────────
function showCtx(x, y, id) {
  ctxId = id;
  const item = items.find(i => i.id === id);
  const isFolder = item?.type === 'folder';
  document.getElementById('ci-open').style.display = isFolder ? 'none' : 'flex';
  document.getElementById('ci-inf').style.display  = isFolder ? 'flex' : 'none';
  document.getElementById('ci-inf2').style.display = isFolder ? 'flex' : 'none';
  const menu = document.getElementById('ctx');
  menu.classList.add('on');
  const W = window.innerWidth, H = window.innerHeight;
  menu.style.left = `${Math.min(x, W - 208)}px`;
  menu.style.top  = `${Math.min(y, H - 200)}px`;
}
function hideCtx() { document.getElementById('ctx').classList.remove('on'); ctxId = null; }

document.getElementById('ci-open').addEventListener('click', () => { if (ctxId) openFile(ctxId); hideCtx(); });
document.getElementById('ci-ren').addEventListener('click', () => {
  const it = items.find(i => i.id === ctxId);
  if (it) openModal('ren', null, it.name);
  hideCtx();
});
document.getElementById('ci-inf').addEventListener('click',  () => { openModal('cf',  ctxId); hideCtx(); });
document.getElementById('ci-inf2').addEventListener('click', () => { openModal('ctf', ctxId); hideCtx(); });
document.getElementById('ci-del').addEventListener('click',  () => { if (ctxId) delItem(ctxId); hideCtx(); });
document.addEventListener('click', ev => { if (!document.getElementById('ctx').contains(ev.target)) hideCtx(); });

// ─── Bottom bar ───────────────────────────────────────
document.getElementById('btn-nf').addEventListener('click',  () => openModal('cf',  targetPid()));
document.getElementById('btn-ntf').addEventListener('click', () => openModal('ctf', targetPid()));

// ─── Export / Import ──────────────────────────────────
document.getElementById('btn-exp').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify({ version: 1, items }, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'mindmap-export.json' });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  toast('Exported mindmap-export.json');
});
document.getElementById('btn-imp').addEventListener('click', () => document.getElementById('imp-in').click());
document.getElementById('imp-in').addEventListener('change', async ev => {
  const file = ev.target.files[0]; if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    const imported = Array.isArray(data) ? data : (data.items || []);
    if (!Array.isArray(imported)) throw 0;
    items = imported; selId = null;
    render(); await set(DB_KEY, items);
    toast(`Imported ${items.length} item(s)`);
  } catch { toast('Import failed — invalid file'); }
  ev.target.value = '';
});

// ─── Keyboard shortcuts ───────────────────────────────
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') { hideCtx(); closeModal(); }
  const active = document.activeElement.tagName;
  if (active === 'INPUT' || active === 'TEXTAREA') return;
  if ((ev.key === 'Delete' || ev.key === 'Backspace') && selId) delItem(selId);
  if (ev.key === 'F2' && selId) {
    const it = items.find(i => i.id === selId);
    if (it) { ctxId = selId; openModal('ren', null, it.name); }
  }
  if (ev.key === 'Enter' && selId) {
    const it = items.find(i => i.id === selId);
    if (it?.type === 'file') openFile(selId);
    if (it?.type === 'folder') toggleFolder(selId);
  }
});

// ─── Drag & Drop ──────────────────────────────────────
const dg = { active: false, itemId: null, startY: 0, startX: 0, dropBeforeId: undefined, dropParentId: undefined };

function startDrag(itemId, clientY, clientX) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  dg.active = true;
  dg.itemId = itemId;
  dg.startY = clientY;
  dg.startX = clientX;

  // Style ghost
  const ghost = document.getElementById('drag-ghost');
  const iconSvg = document.getElementById('ghost-icon');
  document.getElementById('ghost-label').textContent = item.name;
  if (item.type === 'folder') {
    iconSvg.innerHTML = `<path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>`;
  } else {
    iconSvg.innerHTML = `<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>`;
  }
  ghost.style.display = 'flex';
  ghost.style.top = `${clientY - 23}px`;
  ghost.style.left = `${clientX - 80}px`;

  // Dim original
  const el = document.querySelector(`.ti[data-id="${itemId}"]`);
  if (el) el.classList.add('dragging');

  if (navigator.vibrate) navigator.vibrate(20);
}

function moveDrag(clientY, clientX) {
  if (!dg.active) return;

  const ghost = document.getElementById('drag-ghost');
  ghost.style.top = `${clientY - 23}px`;
  ghost.style.left = `${clientX - 80}px`;

  // Find drop position from all visible non-dragged items
  const allEls = [...document.querySelectorAll(`.ti:not(.dragging)`)];
  const line = document.getElementById('drop-line');

  if (allEls.length === 0) {
    dg.dropBeforeId = null;
    dg.dropParentId = null;
    line.style.display = 'none';
    return;
  }

  let dropBeforeId = null;
  let dropParentId = null;
  let lineY = null;

  // Check above first item
  const firstRect = allEls[0].getBoundingClientRect();
  if (clientY < firstRect.top + firstRect.height / 2) {
    dropBeforeId = allEls[0].dataset.id;
    dropParentId = items.find(i => i.id === dropBeforeId)?.parentId ?? null;
    lineY = firstRect.top;
  } else {
    let placed = false;
    for (let i = 0; i < allEls.length - 1; i++) {
      const r = allEls[i].getBoundingClientRect();
      const rn = allEls[i + 1].getBoundingClientRect();
      if (clientY >= r.top + r.height / 2 && clientY < rn.top + rn.height / 2) {
        dropBeforeId = allEls[i + 1].dataset.id;
        dropParentId = items.find(i => i.id === dropBeforeId)?.parentId ?? null;
        lineY = rn.top;
        placed = true;
        break;
      }
    }
    if (!placed) {
      // After last item
      const lastEl = allEls[allEls.length - 1];
      const lastRect = lastEl.getBoundingClientRect();
      const lastItem = items.find(i => i.id === lastEl.dataset.id);
      dropBeforeId = null;
      dropParentId = lastItem?.parentId ?? null;
      lineY = lastRect.bottom;
    }
  }

  dg.dropBeforeId = dropBeforeId;
  dg.dropParentId = dropParentId;

  line.style.display = 'block';
  line.style.top = `${lineY - 1}px`;
}

function endDrag() {
  if (!dg.active) return;
  document.getElementById('drop-line').style.display = 'none';
  document.getElementById('drag-ghost').style.display = 'none';
  document.querySelectorAll('.ti.dragging').forEach(el => el.classList.remove('dragging'));

  if (dg.itemId && dg.dropBeforeId !== dg.itemId) {
    const dragged = items.find(i => i.id === dg.itemId);
    if (dragged) {
      items = items.filter(i => i.id !== dg.itemId);
      dragged.parentId = dg.dropParentId ?? null;
      if (dg.dropBeforeId === null) {
        items.push(dragged);
      } else {
        const idx = items.findIndex(i => i.id === dg.dropBeforeId);
        items.splice(idx === -1 ? items.length : idx, 0, dragged);
      }
      schedSave();
    }
  }

  dg.active = false; dg.itemId = null; dg.dropBeforeId = undefined; dg.dropParentId = undefined;
  render();
}

// Global mouse/touch listeners for drag
window.addEventListener('mousemove', ev => { if (dg.active) moveDrag(ev.clientY, ev.clientX); });
window.addEventListener('mouseup',   () => { if (dg.active) endDrag(); });
window.addEventListener('touchmove', ev => {
  if (dg.active) { ev.preventDefault(); const t = ev.touches[0]; moveDrag(t.clientY, t.clientX); }
}, { passive: false });
window.addEventListener('touchend',  () => { if (dg.active) endDrag(); });

// ─── Toast ────────────────────────────────────────────
let tT = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(tT);
  tT = setTimeout(() => el.classList.remove('on'), 2400);
}

// ─── Boot ─────────────────────────────────────────────
(async () => {
  items = (await get(DB_KEY)) || [];
  render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/mindmap-pwa/sw.js').catch(() => {}));
}
</script>
