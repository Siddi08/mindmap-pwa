<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="MindMap OPS — offline-first hierarchical mind mapping" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MindMap OPS" />
  <link rel="manifest" href="/mindmap-pwa/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <title>MindMap OPS</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            barlow: ['"Barlow Condensed"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            canvas: '#0a0a0a',
            card: '#141414',
            panel: '#1c1c1c',
            border: '#2a2a2a',
            emerald: { DEFAULT: '#10b981', dim: '#065f46' },
            amber: { DEFAULT: '#f59e0b' },
            rose: { DEFAULT: '#f43f5e' },
            sky: { DEFAULT: '#38bdf8' },
            violet: { DEFAULT: '#8b5cf6' },
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-canvas: #0a0a0a;
      --bg-card: #141414;
      --bg-panel: #1c1c1c;
      --border-default: #2a2a2a;
      --border-hover: #3a3a3a;
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      --accent-rose: #f43f5e;
      --accent-sky: #38bdf8;
      --accent-violet: #8b5cf6;
      --text-primary: #e5e7eb;
      --text-muted: #6b7280;
      --text-dim: #4b5563;
    }

    html, body {
      height: 100%;
      background: var(--bg-canvas);
      color: var(--text-primary);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ─── TOOLBAR ─────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 48px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
      z-index: 100;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #toolbar::-webkit-scrollbar { display: none; }

    .toolbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.08em;
      color: var(--accent-emerald);
      white-space: nowrap;
      margin-right: 8px;
    }

    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: var(--border-default);
      flex-shrink: 0;
    }

    .save-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .save-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-emerald);
      flex-shrink: 0;
    }
    .save-dot.saving { background: var(--accent-amber); animation: pulse 0.8s ease-in-out infinite; }
    .save-dot.saved { background: var(--accent-emerald); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tb-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border-default);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .tb-btn:hover {
      border-color: var(--accent-emerald);
      color: var(--accent-emerald);
      background: rgba(16,185,129,0.06);
    }
    .tb-btn:active { transform: scale(0.96); }
    .tb-btn.danger:hover { border-color: var(--accent-rose); color: var(--accent-rose); background: rgba(244,63,94,0.06); }
    .tb-btn svg { width: 13px; height: 13px; }

    /* ─── MAIN AREA ───────────────────────────────────── */
    #main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: var(--bg-canvas);
      overflow: hidden;
    }

    /* ─── SVG CANVAS ──────────────────────────────────── */
    #flow-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: grab;
      user-select: none;
    }
    #flow-svg:active { cursor: grabbing; }

    /* Edge animation */
    @keyframes dashMove {
      to { stroke-dashoffset: -20; }
    }

    .edge-path {
      fill: none;
      stroke: var(--accent-emerald);
      stroke-width: 1.5;
      stroke-dasharray: 5 4;
      opacity: 0.5;
      animation: dashMove 1.2s linear infinite;
    }
    .edge-path.edge-selected { opacity: 0.9; stroke-width: 2; }

    /* Node cards */
    .node-card {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-origin: center center;
    }
    .node-card:hover {
      border-color: var(--border-hover);
    }
    .node-card.selected {
      border-color: var(--accent-emerald);
      box-shadow: 0 0 12px rgba(16,185,129,0.3);
    }

    /* Root node */
    .node-card.type-root {
      background: rgba(16,185,129,0.12);
      border-color: var(--accent-emerald);
      min-width: 160px;
    }
    .node-card.type-root .node-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent-emerald);
    }

    /* Branch node */
    .node-card.type-branch {
      min-width: 130px;
    }
    .node-card.type-branch::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 28px; height: 4px;
      background: var(--accent-emerald);
      border-radius: 0 0 3px 0;
    }

    /* Leaf node */
    .node-card.type-leaf {
      min-width: 100px;
      border-style: dashed;
    }

    .node-inner {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .node-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      flex: 1;
    }

    .node-type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .node-chevron {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.15s;
    }
    .node-chevron:hover { color: var(--accent-emerald); }
    .node-chevron.collapsed { transform: rotate(-90deg); }
    .node-chevron svg { width: 12px; height: 12px; }

    .node-add-child {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 2px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .node-add-child:hover { color: var(--accent-emerald); }
    .node-add-child svg { width: 11px; height: 11px; }

    /* Accent colour variants on left border */
    .node-card.accent-emerald { border-left: 3px solid var(--accent-emerald); }
    .node-card.accent-amber { border-left: 3px solid var(--accent-amber); }
    .node-card.accent-rose { border-left: 3px solid var(--accent-rose); }
    .node-card.accent-sky { border-left: 3px solid var(--accent-sky); }
    .node-card.accent-violet { border-left: 3px solid var(--accent-violet); }

    .badge-goal { background: rgba(16,185,129,0.15); color: var(--accent-emerald); }
    .badge-milestone { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
    .badge-resource { background: rgba(56,189,248,0.15); color: var(--accent-sky); }
    .badge-risk { background: rgba(244,63,94,0.15); color: var(--accent-rose); }

    /* ─── RIGHT PANEL ─────────────────────────────────── */
    #node-editor {
      width: 280px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transform: translateX(100%);
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border-default) transparent;
      position: absolute;
      right: 0; top: 0; bottom: 0;
      z-index: 50;
    }
    #node-editor.open { transform: translateX(0); }
    #node-editor::-webkit-scrollbar { width: 4px; }
    #node-editor::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
    }
    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      font-size: 18px;
      line-height: 1;
      transition: color 0.15s;
    }
    .panel-close:hover { color: var(--text-primary); }

    .panel-body { padding: 14px; display: flex; flex-direction: column; gap: 16px; }

    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field-input {
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: 7px 10px;
      color: var(--text-primary);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--accent-emerald); }

    .pill-group { display: flex; flex-wrap: wrap; gap: 5px; }
    .pill {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border-default);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .pill.active-goal { border-color: var(--accent-emerald); color: var(--accent-emerald); background: rgba(16,185,129,0.1); }
    .pill.active-milestone { border-color: var(--accent-amber); color: var(--accent-amber); background: rgba(245,158,11,0.1); }
    .pill.active-resource { border-color: var(--accent-sky); color: var(--accent-sky); background: rgba(56,189,248,0.1); }
    .pill.active-risk { border-color: var(--accent-rose); color: var(--accent-rose); background: rgba(244,63,94,0.1); }

    .swatch-group { display: flex; gap: 8px; }
    .swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #fff; transform: scale(1.1); }
    .swatch-emerald { background: var(--accent-emerald); }
    .swatch-amber { background: var(--accent-amber); }
    .swatch-rose { background: var(--accent-rose); }
    .swatch-sky { background: var(--accent-sky); }
    .swatch-violet { background: var(--accent-violet); }

    .depth-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .panel-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-default);
      background: transparent;
      color: var(--text-primary);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
    }
    .panel-action-btn:hover { border-color: var(--accent-emerald); color: var(--accent-emerald); background: rgba(16,185,129,0.06); }
    .panel-action-btn.danger:hover { border-color: var(--accent-rose); color: var(--accent-rose); background: rgba(244,63,94,0.06); }
    .panel-action-btn svg { width: 13px; height: 13px; }

    /* ─── TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-panel);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 8px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-primary);
      z-index: 999;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── EMPTY STATE ─────────────────────────────────── */
    #empty-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.3s;
    }
    #empty-hint.hidden { opacity: 0; }
    .empty-hint-icon {
      width: 48px; height: 48px;
      margin: 0 auto 12px;
      color: var(--text-dim);
    }
    .empty-hint-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .empty-hint-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
      opacity: 0.6;
    }

    /* ─── MINI MAP ────────────────────────────────────── */
    #minimap {
      position: absolute;
      bottom: 16px; left: 16px;
      width: 120px; height: 80px;
      background: rgba(20,20,20,0.85);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      overflow: hidden;
      pointer-events: none;
      z-index: 10;
    }

    /* ─── ZOOM CONTROLS ───────────────────────────────── */
    #zoom-controls {
      position: absolute;
      bottom: 16px; right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zoom-btn {
      width: 28px; height: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
      transition: all 0.15s;
    }
    .zoom-btn:hover { border-color: var(--accent-emerald); color: var(--accent-emerald); }

    /* ─── CONTEXT MENU ────────────────────────────────── */
    #ctx-menu {
      position: fixed;
      background: var(--bg-panel);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 4px 0;
      z-index: 200;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: none;
    }
    #ctx-menu.show { display: block; }
    .ctx-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.04); }
    .ctx-item.danger { color: var(--accent-rose); }
    .ctx-item svg { width: 13px; height: 13px; }
    .ctx-divider { height: 1px; background: var(--border-default); margin: 3px 0; }

    @media (max-width: 480px) {
      #node-editor { width: 100vw; }
      .toolbar-title { font-size: 15px; }
    }
  </style>
</head>
<body>

<div id="app">
  <div id="toolbar" role="toolbar" aria-label="MindMap toolbar">
    <span class="toolbar-title">MINDMAP OPS</span>
    <div class="save-indicator">
      <div class="save-dot saved" id="save-dot"></div>
      <span id="save-status">SAVED</span>
    </div>
    <div class="toolbar-divider"></div>
    <button class="tb-btn" id="btn-add-node" aria-label="Add node">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      ADD NODE
    </button>
    <button class="tb-btn" id="btn-layout" aria-label="Auto layout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="4"/><rect x="3" y="10" width="7" height="4"/><rect x="3" y="17" width="7" height="4"/><line x1="14" y1="5" x2="21" y2="5"/><line x1="14" y1="12" x2="21" y2="12"/><line x1="14" y1="19" x2="21" y2="19"/></svg>
      AUTO-LAYOUT
    </button>
    <button class="tb-btn" id="btn-collapse-all" aria-label="Collapse all branches">COLLAPSE ALL</button>
    <button class="tb-btn" id="btn-expand-all" aria-label="Expand all branches">EXPAND ALL</button>
    <div class="toolbar-divider"></div>
    <button class="tb-btn" id="btn-export" aria-label="Export as JSON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      EXPORT
    </button>
    <button class="tb-btn" id="btn-import" aria-label="Import JSON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      IMPORT
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" aria-label="Import file input" />
  </div>

  <div id="main-area">
    <div id="canvas-container">
      <div id="empty-hint">
        <svg class="empty-hint-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="6" y="18" width="12" height="8" rx="2"/>
          <rect x="18" y="6" width="12" height="8" rx="2"/>
          <rect x="18" y="34" width="12" height="8" rx="2"/>
          <rect x="30" y="18" width="12" height="8" rx="2"/>
          <line x1="18" y1="10" x2="12" y2="22"/>
          <line x1="24" y1="14" x2="24" y2="18"/>
          <line x1="30" y1="10" x2="36" y2="22"/>
          <line x1="18" y1="38" x2="12" y2="26"/>
          <line x1="30" y1="38" x2="36" y2="26"/>
        </svg>
        <div class="empty-hint-text">YOUR MINDMAP IS EMPTY</div>
        <div class="empty-hint-sub">Click ADD NODE or double-click canvas to begin</div>
      </div>

      <svg id="flow-svg" aria-label="Mind map canvas">
        <defs>
          <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#10b981" opacity="0.5"/>
          </marker>
        </defs>
        <g id="edges-layer"></g>
        <g id="nodes-layer"></g>
      </svg>

      <div id="nodes-html-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>

      <div id="minimap" aria-hidden="true">
        <svg id="minimap-svg" width="120" height="80"></svg>
      </div>

      <div id="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-in" aria-label="Zoom in">+</button>

    <!-- Node Editor Panel -->

        <button class="panel-action-btn danger" id="panel-delete-node" aria-label="Delete node and descendants">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          DELETE NODE

<!-- Context Menu -->
<div id="ctx-menu" role="menu" aria-label="Node context menu">
  <div class="ctx-item" id="ctx-add-child" role="menuitem">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit Label
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" id="ctx-delete" role="menuitem">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    Delete Branch
  </div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>

<script type="module">
/* ═══════════════════════════════════════════════════════════════════
   MINDMAP OPS — Full Application Logic
   ═══════════════════════════════════════════════════════════════════ */

// ─── Storage Module ───────────────────────────────────────────────
const { get, set, del } = idbKeyval;
const KEYS = { nodes: 'mmap-nodes', edges: 'mmap-edges' };

let saveTimer = null;
function schedSave(nodes, edges) {
  const dot = document.getElementById('save-dot');
  const status = document.getElementById('save-status');
  dot.className = 'save-dot saving';
  status.textContent = 'SAVING...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveGraph(nodes, edges);
    dot.className = 'save-dot saved';
    status.textContent = 'SAVED';
  }, 300);
}

async function saveGraph(nodes, edges) {
  await set(KEYS.nodes, JSON.parse(JSON.stringify(nodes)));
  await set(KEYS.edges, JSON.parse(JSON.stringify(edges)));
}

async function loadGraph() {
  const [nodes, edges] = await Promise.all([get(KEYS.nodes), get(KEYS.edges)]);
  if (!nodes || nodes.length === 0) return null;
  return { nodes, edges: edges || [] };
}

// ─── State ────────────────────────────────────────────────────────
let nodes = [];
let edges = [];
let selectedNodeId = null;
let labelDebounceTimer = null;

// Viewport (pan + zoom)
let vp = { x: 0, y: 0, scale: 1 };

// Drag state
let drag = { active: false, nodeId: null, startMX: 0, startMY: 0, startNX: 0, startNY: 0 };
// Pan state
let pan = { active: false, startMX: 0, startMY: 0, startVX: 0, startVY: 0 };

// ─── ID generator ─────────────────────────────────────────────────
let _idCounter = Date.now();
function genId() { return 'n' + (++_idCounter); }

// ─── Depth calculator ─────────────────────────────────────────────
function calcDepth(nodeId, edgeList = edges) {
  let depth = 0;
  let cur = nodeId;
  const visited = new Set();
  while (true) {
    if (visited.has(cur)) break;
    visited.add(cur);
    const parent = edgeList.find(e => e.target === cur);
    if (!parent) break;
    cur = parent.source;
    depth++;
    if (depth > 50) break;
  }
  return depth;
}

function depthLabel(d) {
  if (d === 0) return 'Root';
  if (d === 1) return 'Level 1';
  return `Level ${d}`;
}

function nodeTypeForDepth(depth) {
  if (depth === 0) return 'root';
  if (depth === 1) return 'branch';
  return 'leaf';
}

// ─── Dagre Layout ─────────────────────────────────────────────────
function runDagreLayout() {
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: 'TB', ranksep: 80, nodesep: 40, marginx: 40, marginy: 40 });
  g.setDefaultEdgeLabel(() => ({}));

  const visibleIds = new Set(nodes.filter(n => !n._hidden).map(n => n.id));

  nodes.filter(n => !n._hidden).forEach(n => {
    const w = n.data.nodeType === 'root' ? 160 : (n.data.nodeType === 'branch' ? 140 : 120);
    g.setNode(n.id, { width: w, height: 48 });
  });

  edges.forEach(e => {
    if (visibleIds.has(e.source) && visibleIds.has(e.target)) {
      g.setEdge(e.source, e.target);
    }
  });

  dagre.layout(g);

  nodes.forEach(n => {
    const gn = g.node(n.id);
    if (gn) {
      n.position = { x: gn.x - gn.width / 2, y: gn.y - gn.height / 2 };
    }
  });

  fitView();
  render();
  toast('Tree layout applied');
}

// ─── Collapse / Expand ────────────────────────────────────────────
function getDescendants(nodeId) {
  const result = [];
  const queue = [nodeId];
  while (queue.length) {
    const cur = queue.shift();
    const children = edges.filter(e => e.source === cur).map(e => e.target);
    children.forEach(c => { result.push(c); queue.push(c); });
  }
  return result;
}

function collapseNode(nodeId) {
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  n.data.collapsed = true;
  const descs = getDescendants(nodeId);
  descs.forEach(id => {
    const dn = nodes.find(n => n.id === id);
    if (dn) dn._hidden = true;
  });
}

function expandNode(nodeId) {
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  n.data.collapsed = false;
  // Only un-hide direct children; children of collapsed descendants stay hidden
  function expandRecursive(nid) {
    const nn = nodes.find(x => x.id === nid);
    if (!nn) return;
    nn._hidden = false;
    if (!nn.data.collapsed) {
      edges.filter(e => e.source === nid).forEach(e => expandRecursive(e.target));
    }
  }
  edges.filter(e => e.source === nodeId).forEach(e => expandRecursive(e.target));
}

function recomputeVisibility() {
  // Reset hidden flags, then re-apply based on collapse state top-down
  nodes.forEach(n => { n._hidden = false; });
  // BFS from root-like nodes
  nodes.forEach(n => {
    if (n.data.collapsed) {
      const descs = getDescendants(n.id);
      descs.forEach(id => {
        const dn = nodes.find(x => x.id === id);
        if (dn) dn._hidden = true;
      });
    }
  });
}

// ─── Viewport helpers ─────────────────────────────────────────────
function screenToWorld(sx, sy) {
  const rect = document.getElementById('canvas-container').getBoundingClientRect();
  return {
    x: (sx - rect.left - vp.x) / vp.scale,
    y: (sy - rect.top - vp.y) / vp.scale
  };
}

function worldToScreen(wx, wy) {
  return { x: wx * vp.scale + vp.x, y: wy * vp.scale + vp.y };
}

function fitView() {
  if (nodes.length === 0) return;
  const visible = nodes.filter(n => !n._hidden);
  if (visible.length === 0) return;
  const container = document.getElementById('canvas-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  const pad = 60;
  const xs = visible.map(n => n.position.x);
  const ys = visible.map(n => n.position.y);
  const ws = visible.map(n => nodeWidth(n));
  const hs = visible.map(n => 48);
  const minX = Math.min(...xs);
  const minY = Math.min(...ys);
  const maxX = Math.max(...visible.map((n,i) => xs[i] + ws[i]));
  const maxY = Math.max(...visible.map((n,i) => ys[i] + hs[i]));
  const bW = maxX - minX;
  const bH = maxY - minY;
  const scale = Math.min((W - pad*2) / bW, (H - pad*2) / bH, 1.5);
  vp.scale = Math.max(0.1, scale);
  vp.x = (W - bW * vp.scale) / 2 - minX * vp.scale;
  vp.y = (H - bH * vp.scale) / 2 - minY * vp.scale;
}

function nodeWidth(n) {
  if (n.type === 'root') return 160;
  if (n.type === 'branch') return 140;
  return 120;
}

// ─── Create Node ──────────────────────────────────────────────────
function createNode(parentId = null, position = null) {
  const depth = parentId ? calcDepth(parentId) + 1 : 0;
  const type = nodeTypeForDepth(depth);
  const id = genId();

  let pos = position || { x: 0, y: 0 };
  if (parentId) {
    const parent = nodes.find(n => n.id === parentId);
    if (parent) {
      const siblings = edges.filter(e => e.source === parentId).length;
      pos = { x: parent.position.x + siblings * 150, y: parent.position.y + 100 };
    }
  }

  const newNode = {
    id,
    type,
    position: pos,
    data: {
      label: type === 'root' ? 'Root Node' : (type === 'branch' ? 'Branch' : 'Leaf'),
      nodeType: 'Goal',
      accent: 'emerald',
      collapsed: false,
      depth
    },
    _hidden: false
  };

  nodes.push(newNode);

  if (parentId) {
    edges.push({ id: `e-${parentId}-${id}`, source: parentId, target: id });
    // Expand parent if collapsed
    const parent = nodes.find(n => n.id === parentId);
    if (parent && parent.data.collapsed) {
      expandNode(parentId);
    }
  }

  hideEmptyHint();
  runDagreLayout();
  selectNode(id);
  schedSave(nodes, edges);
  return id;
}

// ─── Delete Node & Descendants ────────────────────────────────────
function deleteNode(nodeId) {
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  if (n.type === 'root' && nodes.filter(x => x.type === 'root').length <= 1) {
    toast('Cannot delete last root node');
    return;
  }

  const descs = getDescendants(nodeId);
  const toDelete = new Set([nodeId, ...descs]);

  nodes = nodes.filter(n => !toDelete.has(n.id));
  edges = edges.filter(e => !toDelete.has(e.source) && !toDelete.has(e.target));

  if (selectedNodeId === nodeId) {
    selectedNodeId = null;
    closePanelEditor();
  }

  if (nodes.length === 0) showEmptyHint();

  runDagreLayout();
  schedSave(nodes, edges);
  toast(`Deleted node + ${descs.length} descendant(s)`);
}

// ─── Select Node ──────────────────────────────────────────────────
function selectNode(nodeId) {
  selectedNodeId = nodeId;
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  openPanelEditor(n);
  render();
}

function deselectAll() {
  selectedNodeId = null;
  closePanelEditor();
  render();
}

// ─── Panel Editor ─────────────────────────────────────────────────
function openPanelEditor(node) {
  const panel = document.getElementById('node-editor');
  panel.classList.add('open');
  document.getElementById('node-label-input').value = node.data.label;
  document.getElementById('depth-badge').textContent = depthLabel(node.data.depth !== undefined ? node.data.depth : calcDepth(node.id));
  document.getElementById('node-id-badge').textContent = node.id;

  // Type pills
  document.querySelectorAll('#type-pills .pill').forEach(p => {
    p.className = 'pill';
    if (p.dataset.type === node.data.nodeType) {
      p.classList.add(`active-${node.data.nodeType.toLowerCase()}`);
    }
  });

  // Accent swatches
  document.querySelectorAll('#accent-swatches .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.accent === node.data.accent);
  });

  // Hide delete for sole root
  const delBtn = document.getElementById('panel-delete-node');
  const isOnlyRoot = node.type === 'root' && nodes.filter(x => x.type === 'root').length <= 1;
  delBtn.style.display = isOnlyRoot ? 'none' : 'flex';
}

function closePanelEditor() {
  document.getElementById('node-editor').classList.remove('open');
}

// ─── Empty hint ───────────────────────────────────────────────────
function showEmptyHint() { document.getElementById('empty-hint').classList.remove('hidden'); }
function hideEmptyHint() { document.getElementById('empty-hint').classList.add('hidden'); }

// ─── Toast ────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ─── Render Engine ────────────────────────────────────────────────
function render() {
  renderEdges();
  renderNodes();
  renderMinimap();
}

function renderEdges() {
  const layer = document.getElementById('edges-layer');
  const visibleIds = new Set(nodes.filter(n => !n._hidden).map(n => n.id));

  layer.innerHTML = '';
  edges.forEach(e => {
    if (!visibleIds.has(e.source) || !visibleIds.has(e.target)) return;
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    if (!src || !tgt) return;

    const sw = nodeWidth(src);
    const tw = nodeWidth(tgt);
    const sh = 48; const th = 48;

    const x1 = src.position.x + sw / 2;
    const y1 = src.position.y + sh;
    const x2 = tgt.position.x + tw / 2;
    const y2 = tgt.position.y;

    const cp1y = y1 + (y2 - y1) * 0.45;
    const cp2y = y2 - (y2 - y1) * 0.45;

    const tx1 = x1 * vp.scale + vp.x;
    const ty1 = y1 * vp.scale + vp.y;
    const tx2 = x2 * vp.scale + vp.x;
    const ty2 = y2 * vp.scale + vp.y;
    const tcp1y = cp1y * vp.scale + vp.y;
    const tcp2y = cp2y * vp.scale + vp.y;

    const isSelected = e.source === selectedNodeId || e.target === selectedNodeId;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', `edge-path${isSelected ? ' edge-selected' : ''}`);
    path.setAttribute('d', `M${tx1},${ty1} C${tx1},${tcp1y} ${tx2},${tcp2y} ${tx2},${ty2}`);
    path.setAttribute('marker-end', 'url(#arrowhead)');
    layer.appendChild(path);
  });
}

function renderNodes() {
  const layer = document.getElementById('nodes-html-layer');
  layer.innerHTML = '';

  nodes.filter(n => !n._hidden).forEach(n => {
    const w = nodeWidth(n);
    const sx = n.position.x * vp.scale + vp.x;
    const sy = n.position.y * vp.scale + vp.y;
    const sw = w * vp.scale;
    const sh = 48 * vp.scale;

    const card = document.createElement('div');
    card.className = `node-card type-${n.type} accent-${n.data.accent}${n.id === selectedNodeId ? ' selected' : ''}`;
    card.style.cssText = `left:${sx}px;top:${sy}px;width:${sw}px;min-height:${sh}px;pointer-events:auto;`;
    card.dataset.nodeId = n.id;

    const inner = document.createElement('div');
    inner.className = 'node-inner';
    inner.style.transform = `scale(${vp.scale})`;
    inner.style.transformOrigin = '0 0';
    inner.style.width = `${w}px`;

    // Chevron for branch/root nodes that have children
    const hasChildren = edges.some(e => e.source === n.id);
    if (hasChildren && n.type !== 'leaf') {
      const chevron = document.createElement('button');
      chevron.className = `node-chevron${n.data.collapsed ? ' collapsed' : ''}`;
      chevron.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
      chevron.setAttribute('aria-label', n.data.collapsed ? 'Expand' : 'Collapse');
      chevron.addEventListener('click', ev => {
        ev.stopPropagation();
        if (n.data.collapsed) { expandNode(n.id); } else { collapseNode(n.id); }
        render();
        schedSave(nodes, edges);
      });
      inner.appendChild(chevron);
    }

    // Label
    const label = document.createElement('span');
    label.className = 'node-label';
    label.textContent = n.data.label;
    inner.appendChild(label);

    // Type badge
    const badge = document.createElement('span');
    badge.className = `node-type-badge badge-${n.data.nodeType.toLowerCase()}`;
    badge.textContent = n.data.nodeType.substring(0, 3).toUpperCase();
    inner.appendChild(badge);

    // Add-child quick button (leaf nodes)
    const addBtn = document.createElement('button');
    addBtn.className = 'node-add-child';
    addBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    addBtn.setAttribute('aria-label', 'Add child node');
    addBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      createNode(n.id);
    });
    inner.appendChild(addBtn);

    card.appendChild(inner);

    // Node click
    card.addEventListener('click', ev => {
      ev.stopPropagation();
      selectNode(n.id);
    });

    // Node double-click → add child
    card.addEventListener('dblclick', ev => {
      ev.stopPropagation();
      createNode(n.id);
    });

    // Node drag
    card.addEventListener('mousedown', ev => {
      if (ev.target.tagName === 'BUTTON') return;
      ev.stopPropagation();
      drag = { active: true, nodeId: n.id, startMX: ev.clientX, startMY: ev.clientY, startNX: n.position.x, startNY: n.position.y };
    });

    // Touch drag
    card.addEventListener('touchstart', ev => {
      if (ev.target.tagName === 'BUTTON') return;
      ev.stopPropagation();
      const t = ev.touches[0];
      drag = { active: true, nodeId: n.id, startMX: t.clientX, startMY: t.clientY, startNX: n.position.x, startNY: n.position.y };
    }, { passive: true });

    // Right-click context menu
    card.addEventListener('contextmenu', ev => {
      ev.preventDefault();
      ev.stopPropagation();
      selectNode(n.id);
      showCtxMenu(ev.clientX, ev.clientY, n.id);
    });

    layer.appendChild(card);
  });
}

function renderMinimap() {
  const svg = document.getElementById('minimap-svg');
  svg.innerHTML = '';
  if (nodes.length === 0) return;

  const visible = nodes.filter(n => !n._hidden);
  if (visible.length === 0) return;

  const xs = visible.map(n => n.position.x);
  const ys = visible.map(n => n.position.y);
  const minX = Math.min(...xs) - 10;
  const minY = Math.min(...ys) - 10;
  const maxX = Math.max(...visible.map((n,i) => xs[i] + nodeWidth(n))) + 10;
  const maxY = Math.max(...ys) + 58;
  const bW = maxX - minX;
  const bH = maxY - minY;
  const scale = Math.min(120 / bW, 80 / bH);

  visible.forEach(n => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    const rx = (n.position.x - minX) * scale;
    const ry = (n.position.y - minY) * scale;
    rect.setAttribute('x', rx); rect.setAttribute('y', ry);
    rect.setAttribute('width', nodeWidth(n) * scale); rect.setAttribute('height', 48 * scale);
    rect.setAttribute('rx', '1');
    rect.setAttribute('fill', n.id === selectedNodeId ? '#10b981' : '#2a2a2a');
    svg.appendChild(rect);
  });
}

// ─── Context Menu ─────────────────────────────────────────────────
let ctxNodeId = null;
function showCtxMenu(x, y, nodeId) {
  ctxNodeId = nodeId;
  const menu = document.getElementById('ctx-menu');
  menu.classList.add('show');
  const W = window.innerWidth; const H = window.innerHeight;
  const mw = 160; const mh = 120;
  menu.style.left = `${Math.min(x, W - mw - 8)}px`;
  menu.style.top = `${Math.min(y, H - mh - 8)}px`;
}
function hideCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('show');
  ctxNodeId = null;
}

document.getElementById('ctx-add-child').addEventListener('click', () => {
  if (ctxNodeId) createNode(ctxNodeId);
  hideCtxMenu();
});
document.getElementById('ctx-edit').addEventListener('click', () => {
  if (ctxNodeId) { selectNode(ctxNodeId); document.getElementById('node-label-input').focus(); }
  hideCtxMenu();
});
document.getElementById('ctx-delete').addEventListener('click', () => {
  if (ctxNodeId) deleteNode(ctxNodeId);
  hideCtxMenu();
});

// ─── Canvas interactions ──────────────────────────────────────────
const canvas = document.getElementById('canvas-container');
const svg = document.getElementById('flow-svg');

// Pan on canvas mousedown (not on node)
svg.addEventListener('mousedown', ev => {
  if (ev.button !== 0) return;
  pan = { active: true, startMX: ev.clientX, startMY: ev.clientY, startVX: vp.x, startVY: vp.y };
});

// Double-click canvas → create node at that position
svg.addEventListener('dblclick', ev => {
  const pos = screenToWorld(ev.clientX, ev.clientY);
  const id = genId();
  const depth = 0;
  nodes.push({
    id, type: 'root', position: pos,
    data: { label: 'New Node', nodeType: 'Goal', accent: 'emerald', collapsed: false, depth: 0 },
    _hidden: false
  });
  hideEmptyHint();
  selectNode(id);
  render();
  schedSave(nodes, edges);
});

window.addEventListener('mousemove', ev => {
  if (drag.active) {
    const dx = (ev.clientX - drag.startMX) / vp.scale;
    const dy = (ev.clientY - drag.startMY) / vp.scale;
    const n = nodes.find(n => n.id === drag.nodeId);
    if (n) { n.position = { x: drag.startNX + dx, y: drag.startNY + dy }; }
    render();
    return;
  }
  if (pan.active) {
    vp.x = pan.startVX + (ev.clientX - pan.startMX);
    vp.y = pan.startVY + (ev.clientY - pan.startMY);
    render();
  }
});

window.addEventListener('mouseup', ev => {
  if (drag.active) {
    drag.active = false;
    schedSave(nodes, edges);
  }
  if (pan.active) pan.active = false;
});

// Touch pan
let touches = {};
canvas.addEventListener('touchstart', ev => {
  [...ev.changedTouches].forEach(t => { touches[t.identifier] = { x: t.clientX, y: t.clientY }; });
  if (ev.touches.length === 1 && !drag.active) {
    const t = ev.touches[0];
    pan = { active: true, startMX: t.clientX, startMY: t.clientY, startVX: vp.x, startVY: vp.y };
  }
}, { passive: true });

canvas.addEventListener('touchmove', ev => {
  ev.preventDefault();
  if (ev.touches.length === 2) {
    // Pinch zoom
    const [t1, t2] = ev.touches;
    const prev1 = touches[t1.identifier]; const prev2 = touches[t2.identifier];
    if (prev1 && prev2) {
      const prevDist = Math.hypot(prev1.x - prev2.x, prev1.y - prev2.y);
      const newDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      const ratio = newDist / prevDist;
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;
      const rect = canvas.getBoundingClientRect();
      zoomAt(cx - rect.left, cy - rect.top, ratio);
    }
    [...ev.changedTouches].forEach(t => { touches[t.identifier] = { x: t.clientX, y: t.clientY }; });
    pan.active = false;
    return;
  }
  if (pan.active && ev.touches.length === 1) {
    const t = ev.touches[0];
    vp.x = pan.startVX + (t.clientX - pan.startMX);
    vp.y = pan.startVY + (t.clientY - pan.startMY);
    render();
  }
}, { passive: false });

canvas.addEventListener('touchend', ev => {
  [...ev.changedTouches].forEach(t => delete touches[t.identifier]);
  if (ev.touches.length === 0) { pan.active = false; drag.active = false; }
});

// Wheel zoom
canvas.addEventListener('wheel', ev => {
  ev.preventDefault();
  const factor = ev.deltaY < 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  zoomAt(ev.clientX - rect.left, ev.clientY - rect.top, factor);
}, { passive: false });

function zoomAt(cx, cy, factor) {
  const newScale = Math.max(0.1, Math.min(2.5, vp.scale * factor));
  const ratio = newScale / vp.scale;
  vp.x = cx - ratio * (cx - vp.x);
  vp.y = cy - ratio * (cy - vp.y);
  vp.scale = newScale;
  render();
}

// Click canvas background → deselect
canvas.addEventListener('click', ev => {
  if (ev.target === canvas || ev.target === svg || ev.target.id === 'flow-svg') {
    deselectAll();
    hideCtxMenu();
  }
});

// Context menu dismiss
document.addEventListener('click', ev => {
  if (!document.getElementById('ctx-menu').contains(ev.target)) hideCtxMenu();
});
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') { hideCtxMenu(); deselectAll(); }
  if ((ev.key === 'Delete' || ev.key === 'Backspace') && selectedNodeId && document.activeElement.tagName !== 'INPUT') {
    deleteNode(selectedNodeId);
  }
  if (ev.key === 'Enter' && selectedNodeId && document.activeElement.tagName !== 'INPUT') {
    createNode(selectedNodeId);
  }
});

// ─── Toolbar handlers ─────────────────────────────────────────────
document.getElementById('btn-add-node').addEventListener('click', () => {
  createNode(selectedNodeId || null);
});

document.getElementById('btn-layout').addEventListener('click', () => {
  runDagreLayout();
});

document.getElementById('btn-collapse-all').addEventListener('click', () => {
  nodes.filter(n => n.type !== 'leaf').forEach(n => {
    if (edges.some(e => e.source === n.id)) collapseNode(n.id);
  });
  render();
  schedSave(nodes, edges);
  toast('All branches collapsed');
});

document.getElementById('btn-expand-all').addEventListener('click', () => {
  nodes.forEach(n => { n.data.collapsed = false; n._hidden = false; });
  render();
  schedSave(nodes, edges);
  toast('All branches expanded');
});

document.getElementById('btn-export').addEventListener('click', () => {
  const data = JSON.stringify({ nodes, edges }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'mindmap-backup.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported mindmap-backup.json');
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('import-input').click();
});

document.getElementById('import-input').addEventListener('change', async ev => {
  const file = ev.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data.nodes)) throw new Error('Invalid format');
    nodes = data.nodes.map(n => ({ ...n, _hidden: false }));
    edges = data.edges || [];
    recomputeVisibility();
    selectedNodeId = null;
    closePanelEditor();
    if (nodes.length > 0) hideEmptyHint(); else showEmptyHint();
    runDagreLayout();
    await saveGraph(nodes, edges);
    toast(`Imported ${nodes.length} nodes`);
  } catch (err) {
    toast('Import failed — invalid JSON');
  }
  ev.target.value = '';
});

// Zoom controls
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  const el = document.getElementById('canvas-container');
  zoomAt(el.clientWidth / 2, el.clientHeight / 2, 1.25);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  const el = document.getElementById('canvas-container');
  zoomAt(el.clientWidth / 2, el.clientHeight / 2, 0.8);
});
document.getElementById('btn-zoom-fit').addEventListener('click', () => {
  fitView(); render();
});

// ─── Panel editor handlers ────────────────────────────────────────
document.getElementById('panel-close').addEventListener('click', () => {
  selectedNodeId = null;
  closePanelEditor();
  render();
});

document.getElementById('node-label-input').addEventListener('input', ev => {
  clearTimeout(labelDebounceTimer);
  labelDebounceTimer = setTimeout(() => {
    if (!selectedNodeId) return;
    const n = nodes.find(n => n.id === selectedNodeId);
    if (n) { n.data.label = ev.target.value || 'Untitled'; render(); schedSave(nodes, edges); }
  }, 500);
});

document.getElementById('node-label-input').addEventListener('blur', ev => {
  clearTimeout(labelDebounceTimer);
  if (!selectedNodeId) return;
  const n = nodes.find(n => n.id === selectedNodeId);
  if (n) { n.data.label = ev.target.value || 'Untitled'; render(); schedSave(nodes, edges); }
});

document.getElementById('type-pills').addEventListener('click', ev => {
  const pill = ev.target.closest('.pill');
  if (!pill || !selectedNodeId) return;
  const n = nodes.find(n => n.id === selectedNodeId);
  if (!n) return;
  n.data.nodeType = pill.dataset.type;
  openPanelEditor(n);
  render();
  schedSave(nodes, edges);
});

document.getElementById('accent-swatches').addEventListener('click', ev => {
  const swatch = ev.target.closest('.swatch');
  if (!swatch || !selectedNodeId) return;
  const n = nodes.find(n => n.id === selectedNodeId);
  if (!n) return;
  n.data.accent = swatch.dataset.accent;
  openPanelEditor(n);
  render();
  schedSave(nodes, edges);
});

document.getElementById('panel-add-child').addEventListener('click', () => {
  if (selectedNodeId) createNode(selectedNodeId);
});

document.getElementById('panel-delete-node').addEventListener('click', () => {
  if (selectedNodeId) deleteNode(selectedNodeId);
});

// ─── Bootstrap ────────────────────────────────────────────────────
async function init() {
  const saved = await loadGraph();

  if (saved && saved.nodes && saved.nodes.length > 0) {
    nodes = saved.nodes.map(n => ({ ...n, _hidden: false }));
    edges = saved.edges || [];
    recomputeVisibility();
    hideEmptyHint();
    fitView();
    render();
  } else {
    showEmptyHint();
  }
}

init();

// ─── Service Worker Registration ──────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/mindmap-pwa/sw.js').catch(() => {});
  });
}
</script>
